services:
  # Web Service - FastAPI Application
  - type: web
    name: marketplace-api
    env: python
    region: frankfurt
    plan: free
    rootDir: api
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: marketplace-db
          property: connectionString

  # Cron Job - Deactivate Expired Offers
  - type: cron
    name: deactivate-offers-cron
    env: python
    region: frankfurt
    schedule: "0 2 * * *"
    rootDir: api
    buildCommand: pip install -r ../requirements.txt
    startCommand: python cron_deactivate_offers.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketplace-db
          property: connectionString

databases:
  # PostgreSQL Database
  - name: marketplace-db
    databaseName: marketplace
    region: frankfurt
    plan: free